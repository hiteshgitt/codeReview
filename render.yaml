services:
  - type: web
    name: web-audit-pro-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium-browser
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: CHROME_PATH
        value: /usr/bin/chromium-browser
      - key: AUDIT_TIMEOUT_MS
        value: "120000"
      - key: MAX_CONCURRENT_AUDITS
        value: "2"
      - key: AUDIT_TMP_DIR
        value: /tmp/web-audit-pro

  - type: worker
    name: web-audit-pro-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.worker
    dockerContext: ./backend
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium-browser
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: CHROME_PATH
        value: /usr/bin/chromium-browser
      - key: AUDIT_TIMEOUT_MS
        value: "120000"
      - key: MAX_CONCURRENT_AUDITS
        value: "2"
      - key: AUDIT_TMP_DIR
        value: /tmp/web-audit-pro
